<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="stylesheet" href="styles/studio.css">
    <link rel="stylesheet" href="styles/fontawesome/css/all.css">
</head>

<body>
    <section class="stwPanels" onclick="managePanel(event)">
        <i class="fa-thin fa-fw fa-sitemap" title="Webbase" data-panel="/panels/webbase.html"></i>
        <i class="fa-thin fa-fw fa-search" title="Search" data-panel="/panels/search.html"></i>
        <i class="fa-thin fa-fw fa-database" title="Datasources" data-panel="/panels/datasources.html"></i>
        <i class="fa-thin fa-fw fa-shield" title="Security" data-panel="/panels/security.html"></i>
        <i class="fa-thin fa-fw fa-copy" title="Files" data-panel="/panels/files.html"></i>
        <span></span>
        <i class="fa-thin fa-fw fa-circle-user" title="Account" data-panel="/panels/account.html"></i>
        <i class="fa-thin fa-fw fa-cog" title="Settings" data-panel="/panels/settings.html"></i>
    </section>
    <section class="stwPanel"></section>
    <div class="stwVSplitter"></div>
    <section class="stwMain">
        <div>
            <span class="stwTabLabel" selected><i class="fa-thin fa-fw fa-browsers"></i> Browse</span>
            <span class="stwTabLabel"><i class="fa-thin fa-fw fa-file-code"></i> index.htm</span>
            <span class="stwTabLabel"><i class="fa-thin fa-fw fa-file-code"></i> studio.js</span>
            <span class="stwTabLabel"><i class="fa-thin fa-fw fa-file-code"></i> studio.css</span>
        </div>
        <div class="stwTab" selected>
            <div class="stwBrowsebar">
                <i class="fa-thin fa-fw fa-arrow-left"></i>
                <i class="fa-thin fa-fw fa-arrow-rotate-right"></i>
                <i class="fa-thin fa-fw fa-house"></i>
                <input type="url" name="url" placeholder="URL" onchange="setURL(event)">
            </div>
            <iframe title="Site" src="https://www.spintheweb.org" onload="setURL(event)"></iframe>
        </div>
        <textarea class="stwTab" src="index.html" placeholder="text/html"></textarea>
        <textarea class="stwTab" src="scripts/studio.js" placeholder="text/javascript"></textarea>
        <textarea class="stwTab" src="styles/studio.css" placeholder="text/css"></textarea>
    </section>
    <section class="stwStatusbar"></section>

    <script src="scripts/studio.js" defer></script>
</body>

</html>
