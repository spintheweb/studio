<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
        integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles/studio.css">
    <script src="scripts/studio.js"></script>
</head>

<body class="stwDark">
    <section class="stwPanels" onclick="stwStudio.managePanels(event)">
        <i tabindex="0" role="link" class="fa fa-fw fa-bars" title="Menu" data-panel="stwMenu"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-sitemap" title="Webbase" data-panel="/panels/webbase.html"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-search" title="Search" data-panel="/panels/search.html"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-folder" title="Explorer" data-panel="/panels/explorer.html"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-code-branch" title="Source control"
            data-panel="/panels/sourcecontrol.html"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-database" title="Datasources"
            data-panel="/panels/datasources.html"></i>
        <i tabindex="0" role="link" class="fa fa-fw fa-users" title="Groups" data-panel="/panels/groups.html"></i>
        <span></span>
        <i tabindex="0" role="link" class="fa fa-fw fa-cog" title="Settings" data-panel="/panels/settings.html"></i>
    </section>
    <section class="stwPanel"></section>
    <section class="stwTabs">
        <div onclick="stwStudio.manageTab(event)">
            <span tabindex="0" role="link" class="stwTabLabel" title="Browse" selected>Browse</span>
        </div>
        <div class="stwTab" selected>
            <div class="stwBrowsebar" onclick="stwStudio.manageBrowse(event)">
                <i tabindex="0" role="link" class="fa fa-fw fa-arrow-left" title="Back" data-action="back"></i>
                <i tabindex="0" role="link" class="fa fa-fw fa-arrow-rotate-right" title="Refresh"
                    data-action="refresh"></i>
                <i tabindex="0" role="link" class="fa fa-fw fa-house" title="Home" data-action="home"></i>
                <input type="url" name="url" placeholder="URL" onchange="stwStudio.setURL(event)" list="sites"
                    pattern="(http|https)://*" require>
                <datalist id="sites">
                    <option>https://studio.spintheweb.org</option>
                    <option>https://www.keyvisions.it</option>
                </datalist>
            </div>
            <iframe id="Browse" title="Site" src="https://studio.spintheweb.org"
                onload="stwStudio.setURL(event)"></iframe>
        </div>
    </section>
    <section class="stwStatusbar"><span></span><span><i class="fa fa-fw fa-triangle-exclamation"></i> This site is under
            development</span><span></span></section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.14.0/ace.min.js"
        integrity="sha512-s57ywpCtz+4PU992Bg1rDtr6+1z38gO2mS92agz2nqQcuMQ6IvgLWoQ2SFpImvg1rbgqBKeSEq0d9bo9NtBY0w=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.14.0/ext-modelist.js"
        integrity="sha512-sxGVxHzcn3koGZX2OZ+N6Ub/ocKu2ZrpgMJZlucJqNL0iT//7OA0fuxbdy2mJod0xPutYeLPSwjaGv/y1rOu8g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
