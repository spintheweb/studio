<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="stylesheet" href="styles/studio.css">
    <link rel="stylesheet" href="styles/fontawesome/css/all.css">
</head>

<body>
    <section class="stwPanels" onclick="managePanel(event)">
        <i class="fa-thin fa-fw fa-sitemap" title="Webbase" data-panel="/panels/webbase.html"></i>
        <i class="fa-thin fa-fw fa-search" title="Search" data-panel="/panels/search.html"></i>
        <i class="fa-thin fa-fw fa-database" title="Datasources" data-panel="/panels/datasources.html"></i>
        <i class="fa-thin fa-fw fa-shield-halved" title="Security" data-panel="/panels/security.html"></i>
        <i class="fa-thin fa-fw fa-copy" title="Explorer" data-panel="/panels/explorer.html"></i>
        <span></span>
        <i class="fa-thin fa-fw fa-cog" title="Settings" data-panel="/panels/settings.html"></i>
    </section>
    <section class="stwPanel"></section>
    <div class="stwVSplitter"></div>
    <section class="stwMain">
        <div onclick="manageTab(event)">
            <span class="stwTabLabel" selected>Browse</span>
        </div>
        <div class="stwTab" selected>
            <div class="stwBrowsebar" onclick="manageBrowse(event)">
                <i class="fa-thin fa-fw fa-arrow-left" title="Back" data-action="back"></i>
                <i class="fa-thin fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
                <i class="fa-thin fa-fw fa-house" title="Home" data-action="home"></i>
                <input type="url" name="url" placeholder="URL" onchange="setURL(event)">
            </div>
            <iframe title="Site" src="https://www.spintheweb.org" onload="setURL(event)"></iframe>
        </div>
    </section>
    <section class="stwStatusbar"></section>

    <script src="scripts/studio.js" defer></script>
</body>

</html>
