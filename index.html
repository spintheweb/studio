<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/studio.css">
</head>

<body>
    <section class="stwPanels" onclick="stwStudio.managePanel(event)">
        <i class="fa-thin fa-fw fa-sitemap" title="Webbase" data-panel="/panels/webbase.html"></i>
        <i class="fa-thin fa-fw fa-code-branch" title="Source control" data-panel="/panels/sourcecontrol.html"></i>
        <i class="fa-thin fa-fw fa-search" title="Search" data-panel="/panels/search.html"></i>
        <i class="fa-thin fa-fw fa-database" title="Datasources" data-panel="/panels/datasources.html"></i>
        <i class="fa-thin fa-fw fa-users" title="Groups" data-panel="/panels/groups.html"></i>
        <i class="fa-thin fa-fw fa-copy" title="Explorer" data-panel="/panels/explorer.html"></i>
        <span></span>
        <i class="fa-thin fa-fw fa-circle-user" title="Account" data-panel="/panels/account.html"></i>
        <i class="fa-thin fa-fw fa-cog" title="Settings" data-panel="/panels/settings.html"></i>
    </section>
    <section class="stwPanel"></section>
    <section class="stwMain">
        <div onclick="stwStudio.manageTab(event)">
            <span class="stwTabLabel" selected>Browse</span>
        </div>
        <div class="stwTab" selected>
            <div class="stwBrowsebar" onclick="stwStudio.manageBrowse(event)">
                <i class="fa-thin fa-fw fa-arrow-left" title="Back" data-action="back"></i>
                <i class="fa-thin fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
                <i class="fa-thin fa-fw fa-house" title="Home" data-action="home"></i>
                <input type="url" name="url" placeholder="URL" onchange="setURL(event)" list="sites">
                <datalist id="sites">
                    <option>http://studio.spintheweb.org</option>
                </datalist>
            </div>
            <iframe title="Site" src="http://www.spintheweb.org" onload="stwStudio.setURL(event)"></iframe>
        </div>
    </section>
    <section class="stwStatusbar"><i class="fa-thin fa-fw fa-triangle-exclamation"></i> This site is under development</section>

    <script src="scripts/studio.js" defer></script>
    <script src="https://kit.fontawesome.com/b7b91fea3f.js" crossorigin="anonymous"></script>
</body>

</html>
