<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/studio.css">
    <script src="scripts/studio.js"></script>
</head>

<body>
    <section class="stwPanels" onclick="stwStudio.managePanel(event)">
        <i class="fa-light fa-fw fa-bars" title="Menu" data-panel="menu"></i>
        <i class="fa-light fa-fw fa-sitemap" title="Webbase" data-panel="/panels/webbase.html"></i>
        <i class="fa-light fa-fw fa-database" title="Datasources" data-panel="/panels/datasources.html"></i>
        <i class="fa-light fa-fw fa-users" title="Groups" data-panel="/panels/groups.html"></i>
        <i class="fa-light fa-fw fa-copy" title="Explorer" data-panel="/panels/explorer.html"></i>
        <i class="fa-light fa-fw fa-search" title="Search" data-panel="/panels/search.html"></i>
        <i class="fa-light fa-fw fa-code-branch" title="Source control" data-panel="/panels/sourcecontrol.html"></i>
        <span></span>
        <i class="fa-light fa-fw fa-circle-user" title="Account" data-panel="/panels/account.html"></i>
        <i class="fa-light fa-fw fa-cog" title="Settings" data-panel="/panels/settings.html"></i>
    </section>
    <section class="stwPanel"></section>
    <section class="stwTabs">
        <div onclick="stwStudio.manageTab(event)"><span class="stwTabLabel" title="Browse" selected>Browse</span></div>
        <div class="stwTab" selected>
            <div class="stwBrowsebar" onclick="stwStudio.manageBrowse(event)">
                <i class="fa-light fa-fw fa-arrow-left" title="Back" data-action="back"></i>
                <i class="fa-light fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
                <i class="fa-light fa-fw fa-house" title="Home" data-action="home"></i>
                <input type="url" name="url" placeholder="URL" onchange="setURL(event)" list="sites">
                <datalist id="sites">
                    <option>https://studio.spintheweb.org</option>
                </datalist>
            </div>
            <iframe title="Site" src="" onload="stwStudio.setURL(event)"></iframe>
        </div>
    </section>
    <section class="stwStatusbar"><i class="fa-light fa-fw fa-triangle-exclamation"></i> This site is under development</section>

    <script src="https://kit.fontawesome.com/b7b91fea3f.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.14.0/ace.min.js" integrity="sha512-s57ywpCtz+4PU992Bg1rDtr6+1z38gO2mS92agz2nqQcuMQ6IvgLWoQ2SFpImvg1rbgqBKeSEq0d9bo9NtBY0w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.14.0/ext-modelist.js" integrity="sha512-sxGVxHzcn3koGZX2OZ+N6Ub/ocKu2ZrpgMJZlucJqNL0iT//7OA0fuxbdy2mJod0xPutYeLPSwjaGv/y1rOu8g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
