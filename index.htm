<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STW Studio</title>
    <link rel="stylesheet" href="styles/stwStudio.css">
    <link rel="stylesheet" href="styles/fontawesome/css/all.css">
</head>

<body>
    <section class="stwToolbar">
        <i class="fa-thin fa-fw fa-sitemap" title="Webbase" selected></i>
        <i class="fa-thin fa-fw fa-search" title="Search"></i>
        <i class="fa-thin fa-fw fa-database" title="Datasources"></i>
        <i class="fa-thin fa-fw fa-shield" title="Security"></i>
        <i class="fa-thin fa-fw fa-copy" title="Files"></i>
        <span></span>
        <i class="fa-thin fa-fw fa-circle-user" title="Account"></i>
        <i class="fa-thin fa-fw fa-cog" title="Settings"></i>
    </section>
    <section class="stwAside">
        <article>
            <h2>Webbase</h2>
            <ul class="stwTree">
            </ul>
        </article>
        <article>
            <h2>Properties</h2>
        </article>
    </section>
    <div class="stwVSplitter"></div>
    <section class="stwTabs">
        <div>
            <label selected><i class="fa-thin fa-fw fa-browsers"></i> Browser</label>
            <label><i class="fa-thin fa-fw fa-file-code"></i> index.htm</label>
            <label><i class="fa-thin fa-fw fa-file-code"></i> stwStudio.js</label>
            <label><i class="fa-thin fa-fw fa-file-code"></i> stwStudio.css</label>
        </div>
        <div class="stwTab" selected>
            <div style="font-size:1.5em; display: flex;">
                <i class="fa-thin fa-fw fa-arrow-left"></i>&nbsp;
                <i class="fa-thin fa-fw fa-arrow-rotate-right"></i>&nbsp;
                <i class="fa-thin fa-fw fa-house"></i>&nbsp;&nbsp;
                <input type="url" name="url" style="flex:2" placeholder="url" onchange="setURL(event)">
            </div>
            <iframe title="Site" src="/template.htm" onload="setURL(event)"></iframe>
        </div>
        <textarea class="stwTab" src="/index.htm"></textarea>
        <textarea class="stwTab" src="/scripts/stwStudio.js"></textarea>
        <textarea class="stwTab" src="/styles/stwStudio.css"></textarea>
    </section>
    <section class="stwStatusbar"></section>

    <script src="scripts/stwStudio.js"></script>
</body>

</html>
