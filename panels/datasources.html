<div onclick="manageDatasource(event)">
    <h1><i class="fa-light fa-fw"></i> datasources
        <span>
            <i class="fa-light fa-fw fa-plus" title="Add datasource" data-action="addSource"></i>
        </span>
    </h1>
    <table>
        <tbody>
            <tr data-source="wbdl">
                <td><i class="fa-solid fa-fw fa-database"></i> WBDL</td>
            </tr>
        </tbody>
    </table>
</div>
<div class="stwForm">
    <h1><i class="fa-light fa-fw fa-angle-right"></i> properties</h1>
    <form name="properties">
        <input type="text" name="name" placeholder="Name" title="Name">
        <select name="type" title="Type">
            <option>SQL</option>
            <option>No SQL</option>
            <option>Webservice</option>
            <option>JSON</option>
            <option>CSV</option>
            <option>XML</option>
        </select>
        <textarea name="cnn" placeholder="Connection string" title="Connection string"></textarea>
        <label><input type="checkbox" name="disabled"> Disabled</label>
    </form>
</div>
