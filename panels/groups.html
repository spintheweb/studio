<div class="stwTable">
    <h1><i class="fa-light fa-fw"></i> groups
        <span onclick="stwStudio.manageGroups(event)">
            <i class="fa-light fa-fw fa-plus" title="Add group" data-action="addGroup"></i>
        </span>
    </h1>
    <table>
        <tbody>
            <tr data-group="guests">
                <td><i class="fa-solid fa-fw fa-users"></i></td>
                <td>Guests</td>
            </tr>
            <tr data-group="users">
                <td><i class="fa-solid fa-fw fa-users"></i></td>
                <td>Users</td>
            </tr>
            <tr data-group="translators">
                <td><i class="fa-solid fa-fw fa-users"></i></td>
                <td>Translators</td>
            </tr>
            <tr data-group="developers">
                <td><i class="fa-solid fa-fw fa-users"></i></td>
                <td>Developers</td>
            </tr>
            <tr data-group="administrators">
                <td><i class="fa-solid fa-fw fa-users"></i></td>
                <td>Administrators</td>
            </tr>
        </tbody>
    </table>
</div>
<div class="stwForm" id="properties">
    <h1><i class="fa-light fa-fw fa-angle-right"></i> properties</h1>
    <form name="content_properties" onchange="stwStudio.submitForm(event)">
        <input type="text" name="name" placeholder="Name" title="Name" required>
    </form>
</div>
