<div class="stwTree" id="groups" onclick="stwStudio.manageGroups(event)">
    <h1 onclick="stwStudio.manageGroups(event)"><i class="fa fa-fw fa-nothing"></i> groups
        <span>
            <i class="fa fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
            <i class="fa fa-fw fa-plus" title="Add group" data-action="addGroup"></i>
        </span>
    </h1>
    <div class="stwLoading">
        <i class="fa fa-sync fa-spin fa-2x"></i>
    </div>
</div>
<div class="stwForm" id="properties">
    <h1><i class="fa fa-fw fa-angle-right"></i> properties</h1>
    <form onchange="stwStudio.submitForm(event)">
        <input type="text" name="name" placeholder="Name" title="Name" required>
    </form>
</div>
