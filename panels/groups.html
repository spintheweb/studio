<div class="stwTable" onclick="manageGroups(event)">
    <h1><i class="fa-thin fa-fw"></i> groups
        <span>
            <i class="fa-thin fa-fw fa-plus" title="Add group" data-action="addGroup"></i>
        </span>
    </h1>
    <table>
        <tbody>
            <tr>
                <td data-group="guests"><i class="fa-solid fa-fw fa-users"></i> Guests</td>
            </tr>
            <tr>
                <td data-group="users"><i class="fa-solid fa-fw fa-users"></i> Users</td>
            </tr>
            <tr>
                <td data-group="translators"><i class="fa-solid fa-fw fa-users-slash"></i> Translators</td>
            </tr>
            <tr>
                <td data-group="developers"><i class="fa-solid fa-fw fa-users-slash"></i> Developers</td>
            </tr>
            <tr>
                <td data-group="administrators"><i class="fa-solid fa-fw fa-users"></i> Administrators</td>
            </tr>
            <tr>
                <td data-group="root"><i class="fa-solid fa-fw fa-users"></i> Root</td>
            </tr>
        </tbody>
    </table>
</div>
<div class="stwForm" onclick="manageProperties(event)">
    <h1><i class="fa-thin fa-fw fa-angle-down" data-action="collapse"></i> properties</h1>
    <form name="properties">
        <input type="text" name="name" placeholder="Name" title="Name" pattern="^[\p{L}]${3,25}">
        <label><input type="checkbox" name="disabled"> Disabled</label>
    </form>
</div>
