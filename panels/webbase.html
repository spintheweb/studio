<div class="stwTree">
    <h1 onclick="stwStudio.manageWebbase(event)"><i class="fa-thin fa-fw"></i> webbase
        <span>
            <i class="fa-thin fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
            <i class="fa-thin fa-fw fa-folder-plus" title="New area" data-action="newArea"></i>
            <i class="fa-thin fa-fw fa-file-plus" title="New page" data-action="newPage"></i>
            <i class="fa-thin fa-fw fa-square-plus" title="New content" data-action="newContent"></i>
        </span>
    </h1>
</div>
<div class="stwForm" id="properties">
    <h1><i class="fa-thin fa-fw fa-angle-right"></i> properties</h1>
    <form name="content_properties" onchange="stwStudio.submitForm(event)">
        <input type="hidden" name="_id">
        <input type="text" name="name" placeholder="Name" title="Name">

        <input type="text" name="domain" placeholder="URL" title="Domain">
        <input type="text" name="key" placeholder="key" title="Key">
        <input type="text" name="icon" placeholder="icon" title="Icon">
        <input type="text" name="image" placeholder="image" title="Image">
        <input type="text" name="homepage" placeholder="homepage" title="Home page">
        <input type="text" name="lang" placeholder="language" title="Default language">
        <input type="text" name="keywords" placeholder="keywords" title="SEO Keywords">
        <input type="text" name="description" placeholder="description" title="SEO description">

        <div style="display: grid; grid-template-columns: 1fr 5em;">
            <input type="text" name="section" placeholder="Section" title="Section">
            <input type="number" name="sequence" placeholder="Seq." step="0.1" title="Sequence">
        </div>
        <input type="text" name="cssclass" placeholder="CSS class" title="CSS class">
        <select name="subtype" title="Type">
            <option value="text">Text</option>
            <option value="form">Form</option>
            <option value="table">Table</option>
            <option value="list">List</option>
            <option value="tree">Tree</option>
            <option value="tabs">Tabs</option>
            <option value="calendar">Calendar</option>
            <option value="graph">Graph</option>
            <option value="pagelinks">Page links</option>
            <option value="arealinks">Area links</option>
            <option value="indexedlinks">Indexed links</option>
            <option value="breadcrumb">Breadcrumb</option>
            <option value="cliccableimage">Cliccable image</option>
            <option value="shortcut">Shortcut</option>
            <option value="clientsidecode">Client side code</option>
            <option value="serversidecode">Server side code</option>
        </select>
        <select name="dsn" title="Datasource">
            <option></option>
            <option value="webbase">Webbase</option>
        </select>
        <textarea name="query" placeholder="Query" title="Query"></textarea>
        <input type="text" name="parameters" placeholder="key=value" title="Parameters">
        <textarea name="layout" placeholder="Layout" title="Layout"></textarea>
    </form>
</div>
<div class="stwForm" id="authorizations">
    <h1><i class="fa-thin fa-fw fa-angle-right"></i> authorizations</h1>
    <table>
        <tbody>
            <tr>
                <td data-group="guests"><i class="fa-solid fa-fw fa-users"></i> Guests</td><td style="width: 1em;"><i class="fa-solid fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td data-group="users"><i class="fa-solid fa-fw fa-users"></i> Users</td><td><i class="fa-solid fa-fw fa-eye"></i></td>
            </tr>
            <tr>
                <td data-group="translators"><i class="fa-solid fa-fw fa-users"></i> Translators</td><td><i class="fa-thin fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td data-group="developers"><i class="fa-solid fa-fw fa-users"></i> Developers</td><td><i class="fa-thin fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td data-group="administrators"><i class="fa-solid fa-fw fa-users"></i> Administrators</td><td><i class="fa-thin fa-fw fa-eye-slash"></i></td>
            </tr>
        </tbody>
    </table>
</div>
