<div class="stwTree" id="webbase" onclick="stwStudio.manageWebbase(event)">
    <h1><i class="fa-light fa-fw"></i> webbase
        <span>
            <i class="fa-light fa-fw fa-arrow-rotate-right" title="Refresh" data-action="refresh"></i>
            <i class="fa-light fa-fw fa-folder-plus" title="New area" data-action="area"></i>
            <i class="fa-light fa-fw fa-file-plus" title="New page" data-action="page"></i>
            <i class="fa-light fa-fw fa-square-plus" title="New content" data-action="content"></i>
        </span>
    </h1>
</div>
<div class="stwForm" id="properties" onclick="stwStudio.manageProperties(event, 'webbase')">
    <h1><i class="fa-light fa-fw fa-angle-right"></i> properties
        <span>
            <i class="fa-light fa-fw fa-trash" title="Delete" data-action="delete"></i>
            <i class="fa-light fa-fw fa-clone" title="Clone" data-action="clone"></i>
        </span>
    </h1>
    <form name="content_properties" onchange="stwStudio.submitForm(event)">
        <input type="hidden" name="_id">
        <input type="hidden" name="_idparent">
        <input type="hidden" name="type">

        <input type="text" name="name" placeholder="Name" title="Name" required>
        <input type="text" name="slug" placeholder="Slug" title="Slug" required>

        <input type="text" name="url" placeholder="URL" title="url" required>
        <input type="text" name="icon" placeholder="icon" title="Icon">
        <input type="text" name="image" placeholder="image" title="Image">
        
        <input type="text" name="template" placeholder="Template" title="Template" required>
        <input type="text" name="visible">
        
        <input type="text" name="homepage" placeholder="homepage" title="Home page" readonly>
        <input type="text" name="mainpage" placeholder="mainpage" title="Main page" readonly>

        <select name="lang" title="Default language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="fr">French</option>
            <option value="de">German</option>
        </select>
        <input type="text" name="keywords" placeholder="keywords" title="Keywords">
        <textarea name="description" placeholder="description" title="Description"></textarea>

        <div style="display: grid; grid-template-columns: 1fr 5em;">
            <input type="text" name="section" placeholder="Section" title="Section">
            <input type="number" name="sequence" placeholder="Seq." step="0.1" title="Sequence">
        </div>
        
        <input type="text" name="cssclass" placeholder="CSS class" title="CSS class">
        <select name="subtype" title="Type">
            <option value="text">Text</option>
            <option value="form">Form</option>
            <option value="table">Table</option>
            <option value="list">List</option>
            <option value="tree">Tree</option>
            <option value="tabs">Tabs</option>
            <option value="calendar">Calendar</option>
            <option value="graph">Graph</option>
            <option value="pagelinks">Page links</option>
            <option value="arealinks">Area links</option>
            <option value="indexedlinks">Indexed links</option>
            <option value="breadcrumb">Breadcrumb</option>
            <option value="cliccableimage">Cliccable image</option>
            <option value="shortcut">Shortcut</option>
            <option value="clientsidecode">Client side code</option>
            <option value="serversidecode">Server side code</option>
        </select>
        <select name="dsn" title="Datasource">
            <option></option>
            <option value="webbase">Webbase</option>
        </select>
        <textarea name="query" placeholder="Query" title="Query"></textarea>
        <input type="text" name="parameters" placeholder="key=value" title="Parameters">
        <textarea name="layout" placeholder="Layout" title="Layout"></textarea>
    </form>
</div>
<div class="stwForm" id="visibility" onclick="stwStudio.manageVisibility(event)">
    <h1><i class="fa-light fa-fw fa-angle-right"></i> visibility</h1>
    <table>
        <tbody>
            <tr>
                <td><i class="fa-light fa-fw fa-users"></i> guests</td><td style="width: 1em;"><i class="fa-solid fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td><i class="fa-light fa-fw fa-users"></i> users</td><td><i class="fa-solid fa-fw fa-eye"></i></td>
            </tr>
            <tr>
                <td><i class="fa-light fa-fw fa-users"></i> translators</td><td><i class="fa-light fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td><i class="fa-light fa-fw fa-users"></i> developers</td><td><i class="fa-light fa-fw fa-eye-slash"></i></td>
            </tr>
            <tr>
                <td><i class="fa-light fa-fw fa-users"></i> administrators</td><td><i class="fa-light fa-fw fa-eye-slash"></i></td>
            </tr>
        </tbody>
    </table>
</div>
